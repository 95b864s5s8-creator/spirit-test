<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>测了吗</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">
<style>
/* ==================== CSS Reset & Variables ==================== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#16161f;
  --bg-card:rgba(255,255,255,0.06);
  --bg-card-hover:rgba(255,255,255,0.10);
  --gold:#d4a847;
  --gold-light:#f0d78c;
  --gold-dim:#8b7335;
  --text-primary:#f0eee8;
  --text-secondary:#b0aaa4;
  --text-muted:#7a756e;
  --red-accent:#e06060;
  --blue-accent:#6a9ee0;
  --green-accent:#5cc88a;
  --wood-color:#6ab06a;
  --fire-color:#e06060;
  --earth-color:#d4a84d;
  --metal-color:#c8c8d8;
  --water-color:#6a9ee0;
  --radius:16px;
  --radius-sm:10px;
  --transition:all .3s cubic-bezier(.4,0,.2,1);
  --glass:rgba(255,255,255,0.07);
  --glass-border:rgba(255,255,255,0.12);
  --glass-blur:20px;
}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--bg-primary);color:var(--text-primary);
  min-height:100vh;overflow-x:hidden;line-height:1.6;
}
/* 全局渐变背景 */
body::before{
  content:'';position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%, rgba(212,168,71,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 80%, rgba(106,158,224,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 80% 40% at 50% 50%, rgba(224,96,96,0.03) 0%, transparent 60%),
    linear-gradient(160deg, #161624 0%, #1a1a2e 50%, #16161f 100%);
}
.page{display:none;min-height:100vh;padding:20px 16px;max-width:480px;margin:0 auto}
.page.active{display:flex;flex-direction:column;align-items:center}

/* ==================== Animations ==================== */
@keyframes fadeIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInScale{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes floatSlow{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-8px) rotate(2deg)}}
@keyframes pulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes breathe{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(212,168,71,0.08),0 0 60px rgba(212,168,71,0.04)}50%{box-shadow:0 0 30px rgba(212,168,71,0.15),0 0 80px rgba(212,168,71,0.08)}}
@keyframes starTwinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:1;transform:scale(1)}}
/* ==================== 波兰尼节奏：氛围先行，文字延迟 ==================== */
/* 氛围层——emoji/光效/颜色，先到达（0.6s ease-out） */
.atmo-first{animation:fadeIn .6s cubic-bezier(.4,0,.2,1) both}
/* 文字层——理性描述跟在后面（延迟1s后淡入） */
.text-later{opacity:0;animation:fadeIn .8s cubic-bezier(.4,0,.2,1) 1s both}
.text-later-d1{opacity:0;animation:fadeIn .8s cubic-bezier(.4,0,.2,1) 1.2s both}
.text-later-d2{opacity:0;animation:fadeIn .8s cubic-bezier(.4,0,.2,1) 1.5s both}
.text-later-d3{opacity:0;animation:fadeIn .8s cubic-bezier(.4,0,.2,1) 1.8s both}
.text-later-d4{opacity:0;animation:fadeIn .8s cubic-bezier(.4,0,.2,1) 2.1s both}
/* 氛围光晕——大尺寸模糊光斑，先铺底 */
.atmo-glow{
  position:relative;
}
.atmo-glow::before{
  content:'';position:absolute;inset:0;
  border-radius:50%;
  animation:atmoGlowIn 1.2s cubic-bezier(.4,0,.2,1) both;
  pointer-events:none;z-index:-1;
}
@keyframes atmoGlowIn{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}

.animate-in{animation:fadeIn .6s cubic-bezier(.4,0,.2,1) both}
.delay-1{animation-delay:.1s}
.delay-2{animation-delay:.2s}
.delay-3{animation-delay:.3s}
.delay-4{animation-delay:.4s}

/* ==================== Star Particles (全局装饰) ==================== */
.stars{position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden}
.star{
  position:absolute;width:2px;height:2px;background:rgba(212,168,71,0.6);
  border-radius:50%;animation:starTwinkle var(--dur) var(--delay) ease-in-out infinite;
}

/* ==================== Landing Page ==================== */
#page-landing{justify-content:center;text-align:center;padding-top:12vh;position:relative}
.logo-area{margin-bottom:36px;position:relative}
.logo-icon{
  font-size:72px;margin-bottom:20px;
  animation:float 4s ease-in-out infinite;
  filter:drop-shadow(0 0 20px rgba(212,168,71,0.3));
}
/* 光晕环绕 */
.logo-icon::after{
  content:'';position:absolute;top:50%;left:50%;
  width:120px;height:120px;margin:-60px 0 0 -60px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(212,168,71,0.12) 0%, transparent 70%);
  animation:breathe 4s ease-in-out infinite;
  pointer-events:none;
}
.logo-title{
  font-size:32px;font-weight:800;color:var(--gold);letter-spacing:6px;margin-bottom:10px;
  text-shadow:0 0 40px rgba(212,168,71,0.2);
}
.logo-subtitle{font-size:12px;color:var(--text-muted);letter-spacing:4px;text-transform:uppercase}
.tagline{font-size:15px;color:var(--text-secondary);margin-bottom:44px;line-height:2;max-width:280px}
.tagline em{color:var(--gold);font-style:normal}

/* Decorative elements — 重新设计 */
.ink-circles{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:-1}
.ink-circle{position:absolute;border-radius:50%;border:1px solid rgba(212,168,71,0.05);animation:breathe 5s ease-in-out infinite}
.ink-circle:nth-child(1){width:300px;height:300px;margin:-150px}
.ink-circle:nth-child(2){width:500px;height:500px;margin:-250px;animation-delay:1.5s}
.ink-circle:nth-child(3){width:700px;height:700px;margin:-350px;animation-delay:3s}

/* Buttons — 全面升级 */
.btn-primary{
  display:inline-block;padding:16px 52px;border:none;
  background:linear-gradient(135deg, var(--gold), #b8922e);
  color:#16161f;font-size:17px;font-weight:700;letter-spacing:4px;border-radius:60px;
  cursor:pointer;transition:var(--transition);position:relative;overflow:hidden;
  text-decoration:none;
  box-shadow:0 4px 24px rgba(212,168,71,0.25), 0 0 60px rgba(212,168,71,0.08);
}
.btn-primary:hover,.btn-primary:active{
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(212,168,71,0.35), 0 0 80px rgba(212,168,71,0.12);
}
.btn-primary::before{
  content:'';position:absolute;inset:-2px;border-radius:62px;
  background:linear-gradient(135deg, rgba(240,215,140,0.4), rgba(212,168,71,0.1), rgba(240,215,140,0.2));
  z-index:-1;opacity:0;transition:opacity .3s;
}
.btn-primary:hover::before{opacity:1}
/* 按钮光扫效果 */
.btn-primary::after{
  content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  transform:skewX(-20deg);
  animation:btnShine 3s ease-in-out infinite;
}
@keyframes btnShine{0%,100%{left:-60%}50%{left:120%}}
.disclaimer{font-size:11px;color:var(--text-muted);margin-top:36px;line-height:1.8;max-width:260px}

/* ==================== Question Page ==================== */
#page-quiz{justify-content:flex-start;padding-top:40px}
.progress-bar{width:100%;max-width:360px;margin-bottom:28px}
.progress-track{
  height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;
  backdrop-filter:blur(4px);
}
.progress-fill{
  height:100%;background:linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-light));
  border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);width:0;
  box-shadow:0 0 12px rgba(212,168,71,0.3);
}
.progress-text{font-size:12px;color:var(--text-muted);margin-top:8px;text-align:right;letter-spacing:1px}

.question-card{
  width:100%;max-width:400px;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:28px 24px;
  backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  animation:fadeInScale .4s cubic-bezier(.4,0,.2,1) both;
  transition:border-color .3s,box-shadow .3s;
}
/* Grip题——微红氛围 */
.card-grip{border-color:rgba(224,96,96,0.2);box-shadow:0 0 30px rgba(224,96,96,0.06)}
.card-grip .question-title{color:#e8a0a0}
/* 困境题——深蓝氛围 */
.card-dilemma{border-color:rgba(106,158,224,0.2);box-shadow:0 0 30px rgba(106,158,224,0.06)}
.card-dilemma .question-title{color:#a0c0e8}
/* 终极题——金色氛围 */
.card-final{border-color:rgba(212,168,71,0.25);box-shadow:0 0 30px rgba(212,168,71,0.08)}
.card-final .question-title{color:var(--gold)}
.question-number{font-size:12px;color:var(--gold-dim);margin-bottom:12px;letter-spacing:2px}
.question-title{font-size:18px;font-weight:600;line-height:1.7;margin-bottom:8px;color:var(--text-primary)}
.question-subtitle{font-size:12px;color:var(--text-muted);margin-bottom:20px}

/* Options — 毛玻璃风格 */
.options{display:flex;flex-direction:column;gap:10px}
.option-btn{
  padding:14px 18px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);
  border-radius:var(--radius-sm);
  color:var(--text-primary);font-size:14px;line-height:1.6;
  cursor:pointer;transition:var(--transition);text-align:left;
  display:flex;align-items:flex-start;gap:10px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.option-btn:hover,.option-btn:active{
  border-color:rgba(212,168,71,0.3);background:rgba(212,168,71,0.08);
  transform:translateX(4px);
}
.option-btn.selected{
  border-color:var(--gold);background:rgba(212,168,71,0.12);
  box-shadow:0 0 20px rgba(212,168,71,0.1);
}
.option-label{
  display:inline-block;width:24px;height:24px;line-height:24px;text-align:center;
  font-size:11px;border:1px solid var(--text-muted);border-radius:50%;
  color:var(--text-muted);flex-shrink:0;transition:var(--transition);
}
.option-btn.selected .option-label{border-color:var(--gold);color:var(--gold);background:rgba(212,168,71,0.1)}

/* Date input */
.date-input-group{display:flex;flex-direction:column;align-items:center;gap:16px}
.date-label{font-size:14px;color:var(--text-secondary)}
.birth-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}
.birth-field{display:flex;flex-direction:column;align-items:center;gap:4px}
.birth-field label{font-size:11px;color:var(--text-muted)}
.birth-field input{
  width:64px;padding:10px 6px;background:rgba(255,255,255,0.04);border:1px solid rgba(212,168,71,0.25);
  border-radius:8px;color:var(--gold);font-size:16px;text-align:center;outline:none;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.birth-field input:focus{border-color:var(--gold);box-shadow:0 0 20px rgba(212,168,71,0.15)}
.birth-sep{font-size:18px;color:var(--text-muted);padding-top:16px}
.btn-confirm{
  margin-top:20px;padding:12px 40px;
  background:linear-gradient(135deg, var(--gold), #b8922e);
  color:#16161f;border:none;border-radius:50px;font-size:15px;font-weight:700;
  cursor:pointer;transition:var(--transition);letter-spacing:2px;
  box-shadow:0 4px 16px rgba(212,168,71,0.2);
}
.btn-confirm:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 24px rgba(212,168,71,0.3)}
.birth-error{font-size:12px;color:var(--red-accent);margin-top:8px;min-height:18px}

/* Nav buttons */
.quiz-nav{width:100%;max-width:400px;display:flex;justify-content:space-between;align-items:center;margin-top:24px;min-height:44px}
.btn-prev{
  padding:8px 20px;background:transparent;border:1px solid rgba(255,255,255,0.08);
  color:var(--text-secondary);border-radius:50px;font-size:13px;cursor:pointer;
  transition:var(--transition);visibility:hidden;
}
.btn-prev.visible{visibility:visible}
.btn-prev:hover{border-color:var(--gold-dim);color:var(--gold)}

/* ==================== Loading Page ==================== */
#page-loading{justify-content:center;text-align:center}
.loading-icon{font-size:64px;animation:pulse 2s ease-in-out infinite;margin-bottom:24px;filter:drop-shadow(0 0 20px rgba(212,168,71,0.3))}
.loading-text{font-size:16px;color:var(--gold);letter-spacing:3px;margin-bottom:12px}
.loading-sub{font-size:13px;color:var(--text-muted);transition:opacity .3s}
.loading-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
@keyframes taichiSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ==================== Result Page — 单页长滚动 ==================== */
#page-result{justify-content:flex-start;padding-top:20px;padding-bottom:80px}

/* Result faces — 全部显示，去掉切换逻辑 */
.result-face{display:none;width:100%;margin-bottom:40px}
.result-face.active{display:block;animation:fadeIn .6s cubic-bezier(.4,0,.2,1) both}

/* Face 1: 你是什么人 */
.face1-header{text-align:center;margin-bottom:28px}
.face1-badge{
  display:inline-block;padding:5px 18px;
  background:rgba(212,168,71,0.08);border:1px solid rgba(212,168,71,0.15);
  border-radius:20px;font-size:11px;color:var(--gold-dim);letter-spacing:2px;margin-bottom:16px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.face1-emoji{font-size:56px;margin:12px 0 8px;animation:floatSlow 4s ease-in-out infinite;filter:drop-shadow(0 0 16px rgba(212,168,71,0.2));text-align:center;display:flex;justify-content:center;align-items:center}
.face1-title{
  font-size:28px;font-weight:800;color:var(--gold);letter-spacing:4px;margin-bottom:6px;
  text-shadow:0 0 30px rgba(212,168,71,0.15);
}
.face1-tagline{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:24px;max-width:320px}

/* Section cards (shared) — 毛玻璃升级 */
.section-card{
  width:100%;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius);padding:24px;margin-bottom:16px;
  backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  transition:transform .3s, box-shadow .3s;
}
.section-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.section-title{
  font-size:14px;font-weight:600;color:var(--gold);letter-spacing:2px;
  margin-bottom:16px;padding-bottom:10px;
  border-bottom:1px solid rgba(212,168,71,0.1);
}
.section-content{font-size:14px;line-height:1.9;color:var(--text-secondary)}
.section-content strong{color:var(--text-primary);font-weight:600}

/* Face 2: 你的精神状态 */
.roast-card{border-color:rgba(224,96,96,0.15);background:rgba(224,96,96,0.03)}
.roast-card .section-title{color:var(--red-accent);border-bottom-color:rgba(224,96,96,0.12)}
.roast-text{font-size:15px;line-height:2;color:var(--text-primary);position:relative;padding-left:16px}
.roast-text::before{
  content:'\201C';position:absolute;left:0;top:-4px;font-size:48px;
  color:var(--red-accent);opacity:.3;font-family:Georgia,serif;line-height:1;
}
.roast-highlight{color:var(--red-accent);font-weight:600}

/* Grip section */
.grip-card{border-color:rgba(212,168,71,0.12)}
.grip-card .section-title{color:var(--gold);border-bottom-color:rgba(212,168,71,0.1)}
.grip-trigger{font-size:13px;color:var(--text-muted);margin-bottom:8px}
.grip-text{font-size:14px;line-height:1.9;color:var(--text-primary)}

/* Form (终极形态) */
.form-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.form-emoji{font-size:40px}
.form-name{font-size:22px;font-weight:700;color:var(--gold)}
.form-relation{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.form-traditional{font-size:13px;color:var(--text-secondary);font-style:italic;margin-bottom:12px}
.form-explanation{font-size:14px;line-height:1.9;color:var(--text-secondary);margin-bottom:16px}
.form-summary{
  font-size:15px;line-height:1.8;color:var(--text-primary);
  background:rgba(212,168,71,0.06);border-radius:8px;padding:14px 16px;
}

/* Face 3: 守护神 */
.deity-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.deity-card{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:var(--radius-sm);padding:18px 14px;text-align:center;transition:var(--transition);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.deity-card:hover{border-color:var(--gold-dim);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.2)}
.deity-card.main-deity{border-color:rgba(212,168,71,0.25);background:rgba(212,168,71,0.06)}
.deity-emoji{font-size:36px;margin-bottom:8px}
.deity-name{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:2px}
.deity-role{font-size:11px;color:var(--text-muted);margin-bottom:8px}
.deity-reason{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:10px}
.deity-product{
  display:inline-block;padding:3px 10px;
  background:rgba(212,168,71,0.1);border-radius:12px;
  font-size:11px;color:var(--gold-dim);
}
.deity-main-label{
  font-size:10px;color:var(--gold);letter-spacing:2px;margin-bottom:8px;
}
.dilemma-box{
  margin-top:16px;background:rgba(212,168,71,0.04);border-radius:10px;padding:16px;
}
.dilemma-label{font-size:12px;color:var(--gold-dim);margin-bottom:8px}
.dilemma-text{font-size:14px;line-height:1.8;color:var(--text-primary);margin-bottom:8px}

/* Face 4: 带走 */
.share-card{
  width:100%;
  background:linear-gradient(135deg, rgba(212,168,71,0.08) 0%, rgba(106,158,224,0.04) 100%);
  border:1px solid rgba(212,168,71,0.2);border-radius:var(--radius);
  padding:28px 20px;text-align:center;margin-top:8px;position:relative;
  backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  animation:glow 4s ease-in-out infinite;
}
.share-card-title{font-size:16px;font-weight:600;color:var(--gold);margin-bottom:16px;letter-spacing:2px}
.share-card-emoji{font-size:40px;margin-bottom:8px}
.share-card-type{font-size:18px;font-weight:700;color:var(--text-primary);margin-bottom:4px}
.share-card-roast{font-size:13px;color:var(--text-secondary);line-height:1.7;margin-bottom:16px;max-width:280px;margin-left:auto;margin-right:auto}
.share-card-brand{font-size:10px;color:var(--text-muted);letter-spacing:3px;margin-top:12px}

/* CTA */
.cta-section{text-align:center;margin-top:8px;margin-bottom:8px}
.cta-text{font-size:13px;color:var(--text-secondary);margin-bottom:12px;line-height:1.7}
.cta-btn{
  display:inline-block;padding:12px 36px;
  background:linear-gradient(135deg, var(--gold), #b8922e);
  color:#16161f;border:none;border-radius:50px;
  font-size:14px;font-weight:700;cursor:pointer;transition:var(--transition);
  letter-spacing:2px;text-decoration:none;
  box-shadow:0 4px 20px rgba(212,168,71,0.25);
}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(212,168,71,0.35)}

.btn-share{
  margin-top:16px;padding:10px 32px;
  background:rgba(212,168,71,0.08);border:1px solid rgba(212,168,71,0.25);
  color:var(--gold);border-radius:50px;
  font-size:13px;cursor:pointer;transition:var(--transition);letter-spacing:2px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}

<!-- ==================== Engine Scripts ==================== -->
<script>
// === bazi-engine.js (inlined) ===
/**
 * 八字计算引擎 v2.1
 * 
 * 功能：出生日期 → 四柱干支 + 身强身弱 + 最旺五行 + 终极形态匹配
 * 
 * 算法依据：
 * - 身强身弱：计分权重法（同党得分 vs 异党得分，50分界线）
 * - 五行极值：108分制（月支40 + 3地支×12 + 4天干×8）
 * - 平局处理：月令优先 → 异党优先 → 天干透出优先
 * 
 * 浏览器端：通过 window.BaZiEngine 访问所有导出函数
 */
(function(global) {
  'use strict';

// ==================== 基础常量 ====================

const BA_ZI = {
  // 天干（10个）
  tianGan: ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'],
  // 天干→五行：0木 1火 2土 3金 4水
  tianGanWuXing: [0, 0, 1, 1, 2, 2, 3, 3, 4, 4],
  // 地支（12个）
  diZhi: ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'],
  // 地支→五行（本气）：0木 1火 2土 3金 4水
  diZhiWuXing: [4, 2, 0, 0, 2, 1, 1, 2, 3, 3, 2, 0],
  // 五行名称
  wuXingNames: ['木', '火', '土', '金', '水'],
  wuXingEmoji: ['🌱', '🔥', '⛰️', '⚔️', '🌊'],
  // 天干白话描述（用户展示用）
  tianGanDesc: [
    '参天大树型——天生向上、不服就干',   // 甲
    '花草藤蔓型——柔软但韧性十足',       // 乙
    '太阳型——天生自带光芒、照亮别人',   // 丙
    '烛火型——温柔细腻、暗夜中的光',     // 丁
    '大山型——稳重可靠、能扛大事',       // 戊
    '田园型——细腻包容、滋养万物',       // 己
    '利刃型——果断刚毅、说一不二',       // 庚
    '首饰型——精致讲究、内心有锋芒',     // 辛
    '大海型——深邃包容、势不可挡',       // 壬
    '细雨型——润物无声、聪慧灵动',       // 癸
  ],
};

// ==================== 日历工具 ====================

/**
 * 农历节气数据（节气近似时刻，用于判断月令）
 * 使用简化算法：按公历日期区间粗略判断月令
 * 每月以「节气」为分界线，不是农历初一
 */
const JIE_QI_MONTHS = [
  // [月份起始日, 月份结束日, 月支index]  (基于公历)
  // 小寒~立春 → 丑月, 立春~惊蛰 → 寅月, ...
  { monthStart: 1, dayStart: 6, monthEnd: 2, dayEnd: 3, zhi: 1 },   // 丑月 (小寒~立春)
  { monthStart: 2, dayStart: 4, monthEnd: 3, dayEnd: 5, zhi: 2 },   // 寅月 (立春~惊蛰)
  { monthStart: 3, dayStart: 6, monthEnd: 4, dayEnd: 4, zhi: 3 },   // 卯月 (惊蛰~清明)
  { monthStart: 4, dayStart: 5, monthEnd: 5, dayEnd: 5, zhi: 4 },   // 辰月 (清明~立夏)
  { monthStart: 5, dayStart: 6, monthEnd: 6, dayEnd: 5, zhi: 5 },   // 巳月 (立夏~芒种)
  { monthStart: 6, dayStart: 6, monthEnd: 7, dayEnd: 6, zhi: 6 },   // 午月 (芒种~小暑)
  { monthStart: 7, dayStart: 7, monthEnd: 8, dayEnd: 7, zhi: 7 },   // 未月 (小暑~立秋)
  { monthStart: 8, dayStart: 8, monthEnd: 9, dayEnd: 7, zhi: 8 },   // 申月 (立秋~白露)
  { monthStart: 9, dayStart: 8, monthEnd: 10, dayEnd: 7, zhi: 9 },  // 酉月 (白露~寒露)
  { monthStart: 10, dayStart: 8, monthEnd: 11, dayEnd: 7, zhi: 10 }, // 戌月 (寒露~立冬)
  { monthStart: 11, dayStart: 8, monthEnd: 12, dayEnd: 6, zhi: 11 }, // 亥月 (立冬~大雪)
  { monthStart: 12, dayStart: 7, monthEnd: 12, dayEnd: 31, zhi: 0 }, // 子月 (大雪~小寒)
  { monthStart: 1, dayStart: 1, monthEnd: 1, dayEnd: 5, zhi: 0 },   // 子月 (元旦~小寒)
];

/**
 * 根据公历日期获取月支index
 */
function getMonthZhi(month, day) {
  for (const jq of JIE_QI_MONTHS) {
    if (month === jq.monthStart && day >= jq.dayStart) return jq.zhi;
    if (month === jq.monthEnd && day <= jq.dayEnd) return jq.zhi;
    if (month > jq.monthStart && month < jq.monthEnd) return jq.zhi;
  }
  return 0; // fallback 子月
}

/**
 * 根据公历日期获取月干index
 * 规律：甲己之年丙作首，乙庚之岁戊为头...
 * 年干 % 5 → 月干起始index: 2(丙), 4(戊), 6(庚), 8(壬), 0(甲)
 */
function getMonthGan(yearGanIdx, monthZhiIdx) {
  const startGanMap = [2, 4, 6, 8, 0]; // 甲→丙起, 乙→戊起, ...
  const startGan = startGanMap[yearGanIdx % 5];
  return (startGan + monthZhiIdx) % 10;
}

/**
 * 根据公历日期获取日干index
 * 基准日：2000-01-07 = 甲子日 (index=0)
 */
function getDayGan(year, month, day) {
  const base = new Date(2000, 0, 7);
  const target = new Date(year, month - 1, day);
  const diffDays = Math.round((target.getTime() - base.getTime()) / (1000 * 60 * 60 * 24));
  return ((diffDays % 10) + 10) % 10;
}

/**
 * 根据公历日期获取日支index
 * 基准日：2000-01-07 = 子日 (index=0)
 */
function getDayZhi(year, month, day) {
  const base = new Date(2000, 0, 7);
  const target = new Date(year, month - 1, day);
  const diffDays = Math.round((target.getTime() - base.getTime()) / (1000 * 60 * 60 * 24));
  return ((diffDays % 12) + 12) % 12;
}

/**
 * 根据公历日期获取年干index
 */
function getYearGan(year) {
  // 公元年份 → 天干：(year - 4) % 10
  return ((year - 4) % 10 + 10) % 10;
}

/**
 * 根据公历日期获取年支index
 */
function getYearZhi(year) {
  // 公元年份 → 地支：(year - 4) % 12
  return ((year - 4) % 12 + 12) % 12;
}

/**
 * 根据日干和时辰获取时干index
 * 规律：甲己还加甲，乙庚丙作初...
 * 日干 % 5 → 时干起始index
 */
function getHourGan(dayGanIdx, hourZhiIdx) {
  const startGanMap = [0, 2, 4, 6, 8]; // 甲→甲起, 乙→丙起, ...
  const startGan = startGanMap[dayGanIdx % 5];
  return (startGan + hourZhiIdx) % 10;
}

/**
 * 小时 → 时辰地支index
 * 子时: 23-1, 丑时: 1-3, 寅时: 3-5, ...
 */
function getHourZhi(hour) {
  // 将23点归为子时(0), 0点也归为子时
  const adjusted = hour === 23 ? 0 : hour;
  return Math.floor((adjusted + 1) / 2) % 12;
}

// ==================== 四柱干支 ====================

function getFourPillars(year, month, day, hour = 12) {
  const yearGan = getYearGan(year);
  const yearZhi = getYearZhi(year);
  const monthZhi = getMonthZhi(month, day);
  const monthGan = getMonthGan(yearGan, monthZhi);
  const dayGan = getDayGan(year, month, day);
  const dayZhi = getDayZhi(year, month, day);
  const hourZhi = getHourZhi(hour);
  const hourGan = getHourGan(dayGan, hourZhi);

  return { yearGan, yearZhi, monthGan, monthZhi, dayGan, dayZhi, hourGan, hourZhi };
}

// ==================== 五行计算 ====================

/**
 * 获取某位置的五行
 */
function getWuXing(ganIdx, zhiIdx) {
  return {
    ganWuXing: BA_ZI.tianGanWuXing[ganIdx],
    zhiWuXing: BA_ZI.diZhiWuXing[zhiIdx],
  };
}

/**
 * 五行相生关系
 * 木(0)→火(1)→土(2)→金(3)→水(4)→木(0)
 */
const WU_XING_SHENG = { 0: 1, 1: 2, 2: 3, 3: 4, 4: 0 };
/**
 * 五行相克关系
 * 木(0)克土(2), 火(1)克金(3), 土(2)克水(4), 金(3)克木(0), 水(4)克火(1)
 */
const WU_XING_KE = { 0: 2, 1: 3, 2: 4, 3: 0, 4: 1 };

/**
 * 判断是否为同党（同类 + 生我者）
 * @param {number} dayMasterWuXing 日主五行 (0-4)
 * @param {number} targetWuXing 目标五行 (0-4)
 */
function isSameParty(dayMasterWuXing, targetWuXing) {
  if (targetWuXing === dayMasterWuXing) return true; // 同类（比劫）
  if (WU_XING_SHENG[targetWuXing] === dayMasterWuXing) return true; // 生我者（印枭）
  return false;
}

// ==================== 身强身弱 ====================

/**
 * 计算身强身弱得分
 * @param {object} pillars - getFourPillars的返回值
 * @returns {{ score: number, isStrong: boolean }}
 */
function calcStrength(pillars) {
  const { monthZhi, yearZhi, dayZhi, hourZhi } = pillars;
  const dayMasterWX = BA_ZI.tianGanWuXing[pillars.dayGan];

  let score = 0;

  // 1. 月支（月令）—— 权重40分
  const monthZhiWX = BA_ZI.diZhiWuXing[monthZhi];
  if (isSameParty(dayMasterWX, monthZhiWX)) {
    score += 40; // 得令
  }
  // 失令 +0分，不加分

  // 2. 其他地支（年支、日支、时支）—— 每个12分
  const otherZhi = [yearZhi, dayZhi, hourZhi];
  for (const zhi of otherZhi) {
    const zhiWX = BA_ZI.diZhiWuXing[zhi];
    if (isSameParty(dayMasterWX, zhiWX)) {
      score += 12;
    }
  }

  // 3. 所有天干（年干、月干、日干、时干）—— 每个8分
  // 注意：日干也计入（日主自身也算8分，因为日主就是自己）
  const allGan = [pillars.yearGan, pillars.monthGan, pillars.dayGan, pillars.hourGan];
  for (const gan of allGan) {
    const ganWX = BA_ZI.tianGanWuXing[gan];
    if (isSameParty(dayMasterWX, ganWX)) {
      score += 8;
    }
  }

  return {
    score,
    isStrong: score >= 50,
  };
}

// ==================== 五行极值 ====================

/**
 * 计算八字中各五行的得分
 * @param {object} pillars - getFourPillars的返回值
 * @returns {{ scores: number[], maxElement: number, maxScore: number }}
 */
function calcWuXingScores(pillars) {
  const scores = [0, 0, 0, 0, 0]; // 木火土金水

  // 月支 40分
  scores[BA_ZI.diZhiWuXing[pillars.monthZhi]] += 40;

  // 年支、日支、时支 各12分
  scores[BA_ZI.diZhiWuXing[pillars.yearZhi]] += 12;
  scores[BA_ZI.diZhiWuXing[pillars.dayZhi]] += 12;
  scores[BA_ZI.diZhiWuXing[pillars.hourZhi]] += 12;

  // 年干、月干、日干、时干 各8分
  scores[BA_ZI.tianGanWuXing[pillars.yearGan]] += 8;
  scores[BA_ZI.tianGanWuXing[pillars.monthGan]] += 8;
  scores[BA_ZI.tianGanWuXing[pillars.dayGan]] += 8;
  scores[BA_ZI.tianGanWuXing[pillars.hourGan]] += 8;

  // 找最旺五行（含平局处理）
  const maxScore = Math.max(...scores);
  const maxElement = resolveTie(scores, pillars, maxScore);

  return { scores, maxElement, maxScore };
}

/**
 * 平局处理
 * 1. 月令优先：并列中谁占了月支谁赢
 * 2. 异党优先：都没占月令时，日主的异党（克/泄/耗）优先
 * 3. 天干透出优先：同为异党时，天干出现的那个赢
 */
function resolveTie(scores, pillars, maxScore) {
  const dayMasterWX = BA_ZI.tianGanWuXing[pillars.dayGan];
  const monthZhiWX = BA_ZI.diZhiWuXing[pillars.monthZhi];

  // 找出所有达到最高分的五行
  const candidates = [];
  for (let i = 0; i < 5; i++) {
    if (scores[i] === maxScore) candidates.push(i);
  }

  if (candidates.length === 1) return candidates[0];

  // 1. 月令优先
  const monthWinner = candidates.find(c => c === monthZhiWX);
  if (monthWinner !== undefined) return monthWinner;

  // 2. 异党优先（克我/我生/我克）
  const isYiDang = (wx) => {
    return wx === WU_XING_KE[dayMasterWX]  // 克我（官杀）
      || wx === WU_XING_SHENG[dayMasterWX] // 我生（食伤）
      || wx === WU_XING_KE[WU_XING_SHENG[dayMasterWX]]; // 我克（财）的推导：我生的五行所克的不对...
    // 正确推导：我克=我生的五行的所克？不对。
    // 直接定义：木克土，火克金，土克水，金克木，水克火
    // 异党 = 克我 + 我生 + 我克（除同类和生我之外的所有）
  };

  // 重新定义异党：非同党即为异党
  const isYiDangStrict = (wx) => {
    return !isSameParty(dayMasterWX, wx);
  };

  const yiDangCandidates = candidates.filter(c => isYiDangStrict(c));
  if (yiDangCandidates.length === 1) return yiDangCandidates[0];
  if (yiDangCandidates.length > 1) {
    // 3. 天干透出优先
    // 收集所有天干的五行
    const ganWuXings = [
      BA_ZI.tianGanWuXing[pillars.yearGan],
      BA_ZI.tianGanWuXing[pillars.monthGan],
      BA_ZI.tianGanWuXing[pillars.dayGan],
      BA_ZI.tianGanWuXing[pillars.hourGan],
    ];
    for (const ganWX of ganWuXings) {
      if (yiDangCandidates.includes(ganWX)) return ganWX;
    }
    // 都没有天干透出，返回第一个
    return yiDangCandidates[0];
  }

  // 所有候选都是同党（理论上不太可能），取第一个
  return candidates[0];
}

// ==================== 终极形态匹配 ====================

/**
 * 日主五行与最旺五行的关系映射
 * 每种日主对应5种最旺五行的形态ID
 * ID: A=我生(输出), B=我克(现实), C=克我(压力), D=生我(输入), E=同类(自我)
 * 
 * 但实际上是按最旺五行的种类来排列，不是按十神关系
 * 这里按 review-results.md 中的实际排列：
 *   木型：火/土/金/水/木 → A/B/C/D/E（但实际排列是火土金水木）
 *   火型：土/金/水/木/火 → A/B/C/D/E
 *   土型：金/水/木/火/土 → A/B/C/D/E
 *   金型：水/木/火/土/金 → A/B/C/D/E
 *   水型：木/火/土/金/水 → A/B/C/D/E
 */

// 最旺五行 → 形态ID偏移 (每种日主的5种形态按最旺五行排列)
// 对应关系：最旺五行index → 形态ID (A=0, B=1, C=2, D=3, E=4)
const FORM_ID_BY_ELEMENT = {
  // 木型日主：火(0)→A, 土(1)→B, 金(2)→C, 水(3)→D, 木(4)→E
  0: { 1: 0, 2: 1, 3: 2, 4: 3, 0: 4 },  // 日主木：火最旺→A, 土最旺→B, 金最旺→C, 水最旺→D, 木最旺→E
  // 火型日主：土(0)→A, 金(1)→B, 水(2)→C, 木(3)→D, 火(4)→E
  1: { 2: 0, 3: 1, 4: 2, 0: 3, 1: 4 },
  // 土型日主：金(0)→A, 水(1)→B, 木(2)→C, 火(3)→D, 土(4)→E
  2: { 3: 0, 4: 1, 0: 2, 1: 3, 2: 4 },
  // 金型日主：水(0)→A, 木(1)→B, 火(2)→C, 土(3)→D, 金(4)→E
  3: { 4: 0, 0: 1, 1: 2, 2: 3, 3: 4 },
  // 水型日主：木(0)→A, 火(1)→B, 土(2)→C, 金(3)→D, 水(4)→E
  4: { 0: 0, 1: 1, 2: 2, 3: 3, 4: 4 },
};

// 形态ID: 0=A(身强), 1=B(身弱)
// formIndex: 0-4 对应 A-J 中的两种（身强=偶数, 身弱=奇数）
// 形态Key: `{日主五行}_{formIndex}` 如 "0_3" = 木型第4种形态(D)

/**
 * 获取终极形态的Key
 * @param {number} dayMasterWX 日主五行 (0-4)
 * @param {number} maxElementWX 最旺五行 (0-4)
 * @param {boolean} isStrong 是否身强
 * @returns {string} 形态Key，如 "0_0" = 木型A形态
 */
function getFormKey(dayMasterWX, maxElementWX, isStrong) {
  const formMap = FORM_ID_BY_ELEMENT[dayMasterWX];
  const formIndex = formMap[maxElementWX]; // 0-4
  // 每个formIndex对应两个形态：偶数=身强(ID字母), 奇数=身弱(下一个字母)
  // formIndex 0 → 身强=A(0), 身弱=B(1)
  // formIndex 1 → 身强=C(2), 身弱=D(3)
  // formIndex 2 → 身强=E(4), 身弱=F(5)
  // formIndex 3 → 身强=G(6), 身弱=H(7)
  // formIndex 4 → 身强=I(8), 身弱=J(9)
  const variantIndex = isStrong ? formIndex * 2 : formIndex * 2 + 1;
  return `${dayMasterWX}_${variantIndex}`;
}

// ==================== 用神五行计算 ====================

/**
 * 用神五行推导表 v2.0（50条·含身强身弱）
 * 
 * 推导依据：十神生克关系 + 身强身弱承载力 + 通关化解
 * - 身强：能扛，宜"克泄耗"（修剪、泄秀、输出）
 * - 身弱：扛不住，宜"生扶"（补充、支撑、通关）
 * 
 * @param {number} dayMasterWX 日主五行 (0=木,1=火,2=土,3=金,4=水)
 * @param {number} maxElementWX 最旺五行 (0-4)
 * @param {boolean} isStrong 是否身强
 * @returns {number} 用神五行 (0-4)
 */
const CURE_ELEMENT_MAP = {
  // 木型日主
  0: { // 日主=木
    0: { strong: 3, weak: 4 },   // 最旺=木(同类) → 强:金(克), 弱:水(生)
    1: { strong: 2, weak: 4 },   // 最旺=火(我生) → 强:土(泄秀变现), 弱:水(回血克火)
    2: { strong: 1, weak: 0 },   // 最旺=土(我克) → 强:火(通关), 弱:木(帮身)
    3: { strong: 4, weak: 4 },   // 最旺=金(克我) → 强:水(通关), 弱:水(通关)
    4: { strong: 1, weak: 2 },   // 最旺=水(生我) → 强:火(泄秀), 弱:土(筑坝扎根)
  },
  // 火型日主
  1: { // 日主=火
    0: { strong: 2, weak: 2 },   // 最旺=木(生我) → 强:土(泄秀), 弱:土(泄秀输出)
    1: { strong: 4, weak: 0 },   // 最旺=火(同类) → 强:水(克), 弱:木(生)
    2: { strong: 3, weak: 0 },   // 最旺=土(我生) → 强:金(泄秀变现), 弱:木(生)
    3: { strong: 2, weak: 0 },   // 最旺=金(我克) → 强:土(通关), 弱:木(通关帮身)
    4: { strong: 2, weak: 0 },   // 最旺=水(克我) → 强:土(克水), 弱:木(通关化解)
  },
  // 土型日主
  2: { // 日主=土
    0: { strong: 1, weak: 1 },   // 最旺=木(克我) → 强:火(通关), 弱:火(通关)
    1: { strong: 3, weak: 3 },   // 最旺=火(生我) → 强:金(泄秀降温), 弱:金(泄秀降温)
    2: { strong: 0, weak: 1 },   // 最旺=土(同类) → 强:木(克), 弱:火(生)
    3: { strong: 4, weak: 1 },   // 最旺=金(我生) → 强:水(泄秀), 弱:火(回血)
    4: { strong: 0, weak: 1 },   // 最旺=水(我克) → 强:木(通关), 弱:火(帮身固坝)

  3: { // 日主=金
    0: { strong: 1, weak: 2 },   // 最旺=木(我克) → 强:火(通关), 弱:土(帮身通关)
    1: { strong: 4, weak: 2 },   // 最旺=火(克我) → 强:水(对抗激发), 弱:土(通关化解)
    2: { strong: 4, weak: 4 },   // 最旺=土(生我) → 强:水(泄秀冲出), 弱:水(泄秀冲出)
    3: { strong: 1, weak: 2 },   // 最旺=金(同类) → 强:火(克), 弱:土(生)
    4: { strong: 0, weak: 2 },   // 最旺=水(我生) → 强:木(泄秀变现), 弱:土(回血克水)
  },
  // 水型日主
  4: { // 日主=水
    0: { strong: 1, weak: 3 },   // 最旺=木(我生) → 强:火(泄秀变现), 弱:金(回血)
    1: { strong: 0, weak: 3 },   // 最旺=火(我克) → 强:木(通关), 弱:金(帮身)
    2: { strong: 0, weak: 3 },   // 最旺=土(克我) → 强:木(对抗突破), 弱:金(通关化解)
    3: { strong: 0, weak: 0 },   // 最旺=金(生我) → 强:木(泄秀流通), 弱:木(泄秀化浊)
    4: { strong: 2, weak: 3 },   // 最旺=水(同类) → 强:土(克), 弱:金(生)
  },

function getCureElement(dayMasterWX, maxElementWX, isStrong) {
  const strength = isStrong ? 'strong' : 'weak';
  return CURE_ELEMENT_MAP[dayMasterWX][maxElementWX][strength];
}

// ==================== 主入口 ====================

/**
 * 完整的八字分析
 * @param {number} year  公历年
 * @param {number} month 公历月(1-12)
 * @param {number} day   公历日
 * @param {number} hour  小时(0-23)，可选
 * @returns {object} 完整分析结果
 */
function analyzeBaZi(year, month, day, hour = 12) {
  // 1. 四柱干支
  const pillars = getFourPillars(year, month, day, hour);

  // 2. 日主信息
  const dayMasterGan = pillars.dayGan;

  // 3. 身强身弱
  const strength = calcStrength(pillars);

  // 4. 五行极值
  const wuXing = calcWuXingScores(pillars);

  // 5. 终极形态Key
  const formKey = getFormKey(dayMasterWX, wuXing.maxElement, strength.isStrong);

  // 6. 用神五行
  const cureElement = getCureElement(dayMasterWX, wuXing.maxElement, strength.isStrong);

  return {
    pillars,
    dayMasterGan,
    dayMasterWX,
    dayMasterName: BA_ZI.tianGan[dayMasterGan],
    dayMasterWuXingName: BA_ZI.wuXingNames[dayMasterWX],
    dayMasterEmoji: BA_ZI.wuXingEmoji[dayMasterWX],
    dayMasterDesc: BA_ZI.tianGanDesc[dayMasterGan],
    strength: {
      score: strength.score,
      isStrong: strength.isStrong,
      label: strength.isStrong ? '能量满格 🔋' : '潜力股 🪫',
      desc: strength.isStrong ? '天生就扛得住' : '别透支',
    },
    wuXing: {
      scores: wuXing.scores,
      maxElement: wuXing.maxElement,
      maxElementName: BA_ZI.wuXingNames[wuXing.maxElement],
      maxElementEmoji: BA_ZI.wuXingEmoji[wuXing.maxElement],
      maxScore: wuXing.maxScore,
    },
    formKey,
    cureElement: {
      wx: cureElement,
      name: BA_ZI.wuXingNames[cureElement],
      emoji: BA_ZI.wuXingEmoji[cureElement],
    },
  };
}

/**
 * 验证函数 — 用于开发调试
 * 返回可读的四柱干支字符串
 */
function formatPillars(pillars) {
  const B = BA_ZI;

    year: B.tianGan[pillars.yearGan] + B.diZhi[pillars.yearZhi],

    hour: B.tianGan[pillars.hourGan] + B.diZhi[pillars.hourZhi],
  };
}

// ==================== 导出 ====================
global.BaZiEngine = {
  getFourPillars,
  calcStrength,
  calcWuXingScores,
  getFormKey,
  getCureElement,
  analyzeBaZi,
  formatPillars,
  // 常量也导出，供其他模块引用
  BA_ZI,
};

})(typeof window !== 'undefined' ? window : this);

  /**
   * 记录答案
   */
  function recordAnswer(answers, questionId, optionIndex) {
    const q = QUESTIONS[questionId];
    if (!q) return;

    if (q.type === 'date') return;
    if (q.type === 'grip') {
      const gripVal = q.options[optionIndex].grip;
      // 复测逻辑：第一次（题17）缓存，第二次（题18）对比
      if (_gripFirstVote === null) {
        _gripFirstVote = gripVal;
        answers.grip = gripVal;
      } else {
        // 不一致时取第一票（本能反应更准）
        answers.grip = _gripFirstVote;
      }
      return;
    }
    if (q.type === 'dilemma') {
      answers.dilemma = q.options[optionIndex].dilemma;
      return;
    }
    if (q.type === 'cognition') {
      answers.cognition = q.options[optionIndex].cognition;
      return;
    }
    if (q.type === 'cross') {
      const opt = q.options[optionIndex];
      if (opt.crossIE) answers.IE.push(opt.crossIE);
      if (opt.crossSN) answers.SN.push(opt.crossSN);
      if (opt.crossTF) answers.TF.push(opt.crossTF);
      if (opt.crossJP) answers.JP.push(opt.crossJP);
      return;
    }
    if (q.type === 'business') {
      answers.business = q.options[optionIndex].business;
      return;
    }

    // 标准维度题 (IE/SN/TF/JP)
    if (q.dim) {
      const value = q.options[optionIndex].value;
      if (value) answers[q.dim].push(value);
    }
  }

  /**
   * 多数票判定
   */
  function majorityVote(votes) {
    const valid = votes.filter(function(v) { return v !== null && v !== undefined; });
    if (valid.length === 0) return null;
    var counts = {};
    for (var i = 0; i < valid.length; i++) {
      counts[valid[i]] = (counts[valid[i]] || 0) + 1;
    }
    var max = 0, result = null;
    var keys = Object.keys(counts);
    for (var j = 0; j < keys.length; j++) {
      if (counts[keys[j]] > max) { max = counts[keys[j]]; result = keys[j]; }
    }
    return result;

  // ==================== 核心函数 ====================

  /**
   * 16型 → 阵营
   * @param {string} type16 如 'INTJ'
   * @returns {string} 'NT'|'NF'|'SJ'|'SP'
   */
  function getCamp(type16) {
    return TYPE_TO_CAMP[type16] || 'NT'; // 默认NT
  }

  /**
   * 主入口：用神五行 × 16型 → 守护神完整结果
   * 
   * @param {number} cureElementWX 用神五行编号 (0=木,1=火,2=土,3=金,4=水)
   * @param {string} type16 16型人格如 'INTJ'
   * @param {string} [dilemma] 核心困境key（用于Tie-Breaker）
   * @returns {object} { deity, conclusion, camp, cureElement, matrixKey }
   */
  function getDeityPrescription(cureElementWX, type16, dilemma) {
    var camp = getCamp(type16);
    var matrixKey = cureElementWX + '_' + camp;

    // 查矩阵
    var deityKey = MATRIX[cureElementWX] ? MATRIX[cureElementWX][camp] : null;
    if (!deityKey) return null;

    // Tie-Breaker检查
    var tb = TIE_BREAKERS[matrixKey];
    if (tb && dilemma === tb.trigger) {
      deityKey = tb.alternate;
    }

    var deity = DEITIES[deityKey];
    var conclusion = CONCLUSIONS[matrixKey] || null;

    return {
      deityKey: deityKey,
      deity: deity,
      conclusion: conclusion,
      camp: camp,
      campInfo: CAMP_INFO[camp],
      cureElement: WX_INFO[cureElementWX],
      matrixKey: matrixKey,
    };
  }

  /**
   * 简化版：直接查矩阵返回神明key
   * @param {number} cureElementWX 用神五行编号
   * @param {string} camp 阵营 'NT'|'NF'|'SJ'|'SP'
   * @returns {string} 神明key
   */
  function lookupMatrix(cureElementWX, camp) {
    return MATRIX[cureElementWX] ? MATRIX[cureElementWX][camp] : null;
  }

  // ==================== 内部工具函数 ====================

  /**
   * 从16型字符串提取阵营
   * INTJ → 'NT', INFP → 'NF', ISTJ → 'SJ', ESTP → 'SP'
   */
  function getGroup(type16) {
    if (!type16 || type16.length < 4) return null;
    return type16.substring(1, 3); // 取中间两位：N/S + T/F
  }

  // ==================== 对外API ====================

  /**
   * 主分析函数
   * @param {string} type16       - 'INTJ' | 'INFP' | ...
   * @param {string} cureElement  - '木' | '火' | '土' | '金' | '水'
   * @returns {object|null} 失败返回null
   *   {
   *     isEffective:  true/false,
   *     group:        'NT'/'NF'/'SJ'/'SP',
   *     cureElement:  '木'/'火'/'土'/'金'/'水',
   *     tag:          '带血的剃刀',          // 系统诊断词
   *     copy:         '你的命盘...',          // 完整文案（含\n换行）
   *     prescription: '不是让你...'           // 神明处方
   *   }
   */
  function analyze(type16, cureElement) {
    var group = getGroup(type16);
    if (!group) return null;

    var row = MATRIX[cureElement];
    if (!row) return null;

    var isEffective = !!row[group];

    // 查文案：key = 五行 + '_' + 1(有效)/0(无效)
    var key = cureElement + '_' + (isEffective ? 1 : 0);
    var cw = COPYWRITINGS[key];

    return {
      isEffective: isEffective,
      group: group,
      cureElement: cureElement,
      tag: cw ? cw.tag : '',
      copy: cw ? cw.copy : '',
      prescription: cw ? cw.prescription : ''
    };
  }

  // 公开接口
  return {
    analyze: analyze,
    // 暴露矩阵供测试用
    _MATRIX: MATRIX,
    _getGroup: getGroup
  };

})();

</script>

function submitDate() {
  var year = parseInt(document.getElementById('birth-year').value);
  var month = parseInt(document.getElementById('birth-month').value);
  var day = parseInt(document.getElementById('birth-day').value);
  var hour = parseInt(document.getElementById('birth-hour').value);
  var errEl = document.getElementById('birth-error');

  if (!year || year < 1900 || year > 2026) { errEl.textContent = '请输入有效年份'; return; }
  if (!month || month < 1 || month > 12) { errEl.textContent = '月份 1-12'; return; }
  if (!day || day < 1 || day > 31) { errEl.textContent = '日期 1-31'; return; }
  errEl.textContent = '';

  answers.birth = { year: year, month: month, day: day, hour: hour };
  answeredMap[currentQ] = 0; // mark as answered
  goNext();
}

function selectOption(idx) {
  // 高亮选中
  var card = document.getElementById('question-card');
  card.querySelectorAll('.option-btn').forEach(function(b) { b.classList.remove('selected'); });
  card.querySelectorAll('.option-btn')[idx].classList.add('selected');

  // 记录答案
  PersonalityEngine.recordAnswer(answers, currentQ, idx);
  answeredMap[currentQ] = idx;

  // 延迟后自动下一题
  setTimeout(goNext, 350);
}

function goNext() {
  var total = PersonalityEngine.QUESTIONS.length;
  // 彩蛋：特定题号完成后闪过一句吐槽
  if (SOUL_SNACKS[currentQ]) {
    var card = document.getElementById('question-card');
    card.style.animation = 'none';
    card.offsetHeight;
    card.className = 'question-card';
    card.style.animation = 'fadeIn .3s ease both';
    card.innerHTML =
      '<div style="text-align:center;padding:40px 20px">' +
        '<div style="font-size:28px;margin-bottom:16px;color:var(--gold)"><i class="ri-sparkling-2-fill"></i></div>' +
        '<div style="font-size:14px;color:var(--gold);line-height:1.8;letter-spacing:1px">' + SOUL_SNACKS[currentQ] + '</div>' +
      '</div>';
    setTimeout(function() {
      if (currentQ < total - 1) { currentQ++; renderQuestion(); }
      else { showLoading(); }
    }, 1200);
  } else {
    if (currentQ < total - 1) {
      currentQ++;
      renderQuestion();
    } else {
      showLoading();
    }
  }
}

function goPrev() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
  }
}

function showLoading() {
  showPage('page-loading');
  var tips = [

  var tipIdx = 0;

    tipIdx = (tipIdx + 1) % tips.length;

// ==================== RESULT GENERATION ====================
function generateResult() {
  var bazi = BaZiEngine.analyzeBaZi(answers.birth.year, answers.birth.month, answers.birth.day, answers.birth.hour);
  var personality = PersonalityEngine.analyzePersonality(answers);
  var formData = FormDataStore.FORMS[bazi.formKey] || null;

  // 用新矩阵API获取守护神（用神五行 × 16型阵营）
  var prescription = null;
  var mainGod = null;
  var deityConclusion = null;
  if (bazi.cureElement && personality.type16) {
    prescription = DeityMatrix.getDeityPrescription(
      bazi.cureElement.wx, personality.type16, personality.dilemma
    );
    if (prescription) {
      mainGod = prescription.deity;
      deityConclusion = prescription.conclusion;
    }
  }

  // 向后兼容：新API失败时降级到旧映射
  if (!mainGod) {
    var deityMap = personality.type16 ? DeityData.TYPE_DEITY_MAP[personality.type16] : null;
    mainGod = deityMap ? DeityData.DEITIES[deityMap.main] : null;
  }

  // 代偿有效性判定（用神×阵营）
  var compensation = null;
  if (bazi.cureElement && personality.type16) {
    compensation = CompensationEngine.analyze(personality.type16, bazi.cureElement.wx);
  }

  // 存储供分享用
  resultData = { bazi: bazi, personality: personality, formData: formData, mainGod: mainGod, prescription: prescription, compensation: compensation };

  // 渲染4面（情绪曲线：笑→准→扎心→顿悟）
  renderFace1(personality.typeInfo);                           // 身份认同
  renderFace2(bazi, personality, formData);                   // 出厂设置
  renderFace3(compensation);                                  // 代偿判定
  renderFace4(mainGod, deityConclusion, personality.typeInfo); // 守护神压轴

  // 启动滚动触发
  requestAnimationFrame(function() {
    initScrollReveal();
  });

  showPage('page-result');
}

// ==================== 波兰尼节奏：滚动揭示 ====================
function initScrollReveal() {
  var faces = document.querySelectorAll('.result-face');
  // 默认冻结所有动画（保留face-1，它已经在视口中）
  faces.forEach(function(face, idx) {
    if (idx === 0) return; // 第一个面直接播放
    freezeAnimations(face);
    face._revealed = false;
  });

  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting && !entry.target._revealed) {
        entry.target._revealed = true;
        unfreezeAnimations(entry.target);
      }
    });
  }, { threshold: 0.15 });

  faces.forEach(function(face, idx) {
    if (idx > 0) observer.observe(face);
  });
}

// 冻结动画：所有atmo-first/text-later先不跑，等触发
function freezeAnimations(container) {
  var els = container.querySelectorAll('.atmo-first, .text-later, .text-later-d1, .text-later-d2, .text-later-d3, .text-later-d4');
  els.forEach(function(el) {
    el.style.animationPlayState = 'paused';
    el._frozen = true;
  });
}

// 解冻动画
function unfreezeAnimations(container) {
  var els = container.querySelectorAll('.atmo-first, .text-later, .text-later-d1, .text-later-d2, .text-later-d3, .text-later-d4');
  els.forEach(function(el) {
    el.style.animationPlayState = 'running';
    el._frozen = false;
  });
}

          '</p>' +
        '</div>' +
      '</div>';

    // 第四层：为什么是TA（文字延迟2s）
    html +=
      '<div class="section-card text-later-d2">' +
        '<div class="section-title">为什么是' + mainGod.name + '？</div>' +
        '<div class="section-content">' +
          '<p style="font-size:14px;color:var(--text-secondary);line-height:2">' +
            deityConclusion.why +
          '</p>' +
        '</div>' +
      '</div>';

    // 第五层：药方语录（文字延迟2.5s）
    html +=
      '<div class="section-card text-later-d3" style="border-color:var(--gold);border-style:solid">' +
        '<div class="section-content" style="text-align:center">' +
          '<div style="font-size:32px;margin-bottom:8px">' + mainGod.emoji + '</div>' +
          '<p style="font-size:15px;color:var(--gold);line-height:2;font-weight:600;font-style:italic">' +
            '「' + deityConclusion.prescription + '」' +
          '</p>' +
        '</div>' +
      '</div>';

    // 第六层：调整建议（文字延迟3s）— 可折叠
    if (deityConclusion.adjustments) {
      var adj = deityConclusion.adjustments;
      html +=
        '<div class="section-card text-later-d3">' +
          '<div class="section-title">🛠️ 调频建议</div>' +
          '<div class="section-content" style="display:flex;flex-direction:column;gap:16px">' +
            '<div>' +
              '<div style="font-size:12px;color:var(--gold-dim);margin-bottom:6px">状态切换</div>' +
              '<div style="font-size:14px;color:var(--text-secondary);line-height:1.8">' + adj.state + '</div>' +
            '</div>' +
            '<div>' +
              '<div style="font-size:12px;color:var(--gold-dim);margin-bottom:6px">短期行动</div>' +
              '<div style="font-size:14px;color:var(--text-primary);line-height:1.8">' + adj.shortTerm + '</div>' +
            '</div>' +
            '<div class="comp-expand-btn" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'" style="color:var(--gold-dim);font-size:12px;cursor:pointer;text-align:center">▼ 长期修炼</div>' +
            '<div style="display:none">' +
              '<div style="font-size:12px;color:var(--gold-dim);margin-bottom:6px">长期方案</div>' +
              '<div style="font-size:14px;color:var(--text-secondary);line-height:1.8">' + adj.longTerm + '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
    }
  } else {
    // 降级模式
    html +=
      '<div class="section-card text-later-d1">' +
        '<div class="section-content">' +
          '<p style="font-size:14px;color:var(--text-secondary);line-height:2">' +
            '你是一个「<strong style="color:var(--gold)">' + typeInfo.title + '</strong>」，<br>' +
            '所以' + mainGod.name + '被派来帮你——' +
          '</p>' +
        '</div>' +
      '</div>';
  }

  // 第七层：分享卡 + CTA + 免责（文字延迟3.5s）
  var shareRoast = typeInfo.roast.length > 60 ? typeInfo.roast.substring(0, 60) + '…' : typeInfo.roast;
  var comp = resultData.compensation;
  var compBadge = '';
  if (comp) {
    var compIcon = comp.isEffective ? '🟢' : '🔴';
    var compText = comp.isEffective ? '有效代偿' : '无效防御';
    var tagText = comp.tag ? '「' + comp.tag + '」' : '';
    compBadge = '<div style="display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;background:' +
      (comp.isEffective ? 'rgba(74,222,128,0.1);color:#4ade80' : 'rgba(248,113,113,0.1);color:#f87171') +
      ';margin:6px 0">' + compIcon + ' ' + compText + (tagText ? ' · ' + tagText : '') + '</div>';
  }

  // CTA差异化文案
  var ctaCopy = '';
  var ctaBtn = '';
  if (comp) {
    if (comp.isEffective) {
      ctaCopy = '你赢了，但只有你自己知道有多累。<br>你的守护神给你准备了一份减负道具<br>让理智装甲暂时可以脱下来 →';
      ctaBtn = '<button class="cta-btn" onclick="alert(\'将跳转至产品页（演示模式）\')"><i class="ri-hand-heart-line"></i> 查看守护神推荐</button>';
    } else {
      ctaCopy = '系统告诉你代码跑偏了，不是你的问题。<br>你的守护神给你准备了翻盘装备<br>换套武器，重来 →';
      ctaBtn = '<button class="cta-btn" onclick="alert(\'将跳转至产品页（演示模式）\')"><i class="ri-sword-line"></i> 查看守护神推荐</button>';
    }
  } else {
    ctaCopy = '你的守护神给你准备了一份专属能量道具<br>补上你缺的那一块 →';
    ctaBtn = '<button class="cta-btn" onclick="alert(\'将跳转至产品页（演示模式）\')"><i class="ri-search-eye-line"></i> 查看守护神推荐</button>';
  }

  html +=
    '<div class="share-card text-later-d4">' +
      '<div class="share-card-title">📋 测了吗</div>' +
      '<div class="share-card-emoji">' + typeInfo.emoji + '</div>' +
      '<div class="share-card-type">' + typeInfo.title + '</div>' +
      compBadge +
      '<div style="font-size:14px;color:var(--gold);margin:6px 0">' + mainGod.emoji + ' 守护神：' + mainGod.name + '</div>' +
      '<div class="share-card-roast">「' + shareRoast + '」</div>' +
      '<div><button class="btn-share" onclick="shareResult()">📤 分享给朋友</button></div>' +
      '<div class="share-card-brand">测了吗</div>' +
    '</div>' +
    '<div class="section-card text-later-d4 cta-section">' +
      '<div class="cta-text">' + ctaCopy + '</div>' +
      ctaBtn +
    '</div>' +
    '<div class="result-disclaimer text-later-d4">' +
      '此报告由玄学CT机自动生成，不构成医学建议。<br>' +
      '但如果你觉得说中了你，那可能是神仙真的在加班。' +
    '</div>' +
    '<span class="retest-link text-later-d4" onclick="startQuiz()">重新测试</span>';

  document.getElementById('face-4').innerHTML = html;
}

// ==================== SHARE ====================
function shareResult() {
  var mainGodName = resultData.mainGod ? resultData.mainGod.name : '';
  var typeTitle = resultData.personality.typeInfo.title;
  var comp = resultData.compensation;
  // 分享文案：制造好奇心，不暴露内部术语
  var hook = '';
  if (comp) {
    if (comp.isEffective) {
      hook = '说我靠后天硬扛补齐了命盘的缺口，但代价只有我自己知道。';
    } else {
      hook = '说我一直在用错误的方式解决问题，难怪越努力越累。';
    }
  }
  var text = '我的守护神是' + mainGodName + '，人格类型「' + typeTitle + '」。' +
    (hook ? hook + '\n') +
    '测测你的守护神是谁 →';
  if (navigator.share) {
    navigator.share({
      title: '测了吗 — 看看你的守护神是谁',
      text: text,
      url: window.location.href
    }).catch(function() {});
  } else {
    text += '\n' + window.location.href;
    navigator.clipboard.writeText(text).then(function() {
      alert('分享内容已复制到剪贴板！');
    }).catch(function() {
      prompt('请手动复制分享给朋友：', text);
    });
  }
}
</script>
<script>
// ==================== 星星粒子 ====================
(function() {
  var container = document.getElementById('stars-container');
  if (!container) return;
  var count = 40;
  for (var i = 0; i < count; i++) {
    var star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--dur', (3 + Math.random() * 4) + 's');
    star.style.setProperty('--delay', (Math.random() * 5) + 's');
    var size = 1 + Math.random() * 2;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    container.appendChild(star);
  }
})();
</script>
</body>
</html>
